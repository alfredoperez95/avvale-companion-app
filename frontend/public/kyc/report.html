<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Informe KYC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0b1e3f;
      --navy-2: #12294d;
      --ink: #0f172a;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --line: #e2e8f0;
      --line-2: #f1f5f9;
      --accent: #2563eb;
      --accent-2: #6366f1;
      --amber: #d97706;
      --emerald: #059669;
      --rose: #e11d48;
      --violet: #7c3aed;
      --sky: #0284c7;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: #eef2f7;
      font-size: 10pt;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    .display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; letter-spacing: -0.02em; }

    /* Page as A4 sheet — on screen fit content; print still breaks by sheet */
    .sheet {
      width: 210mm;
      margin: 12px auto;
      background: #fff;
      box-shadow: 0 4px 18px rgba(15, 23, 42, 0.10);
      position: relative;
      overflow: hidden;
      border-radius: 4px;
    }
    .sheet + .sheet { margin-top: 12px; }
    .sheet-inner { padding: 14mm 16mm 4mm; }

    /* Toolbar */
    .toolbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 12px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-family: inherit;
      transition: all .15s;
    }
    .btn:hover { background: var(--line-2); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
    }
    .btn-primary:hover { background: linear-gradient(135deg, #1d4ed8, #4f46e5); }

    /* ─── COVER ─── */
    .cover {
      background:
        radial-gradient(circle at 15% 10%, rgba(99, 102, 241, 0.28), transparent 55%),
        radial-gradient(circle at 85% 95%, rgba(37, 99, 235, 0.22), transparent 55%),
        linear-gradient(135deg, #0b1e3f 0%, #12294d 100%);
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .cover-inner {
      padding: 16mm 18mm 14mm;
      position: relative;
      z-index: 2;
    }
    .cover-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18mm;
    }
    .cover-brand-mark {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 15px;
      color: #fff;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
    }
    .cover-brand-text { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.7); }
    .cover-label {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      padding: 4px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      margin-bottom: 14px;
    }
    .cover-title {
      font-size: 44pt;
      line-height: 0.98;
      font-weight: 800;
      margin: 0 0 14px;
      background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .cover-subtitle {
      font-size: 12.5pt;
      color: rgba(255,255,255,0.78);
      margin-bottom: 16px;
      max-width: 150mm;
      line-height: 1.5;
    }
    .cover-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding-top: 12px;
      margin-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .cover-meta-item .k { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.45); }
    .cover-meta-item .v { font-size: 11.5pt; font-weight: 600; color: #fff; margin-top: 3px; }
    .cover-footer {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      font-size: 8.5pt;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .cover-ring {
      position: absolute;
      top: 12mm;
      right: -40px;
      width: 180px;
      height: 180px;
      opacity: 0.22;
      pointer-events: none;
    }

    /* ─── SECTIONS ─── */
    .section { page-break-inside: avoid; margin-bottom: 14px; }
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
    }
    .section-num {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .section-title {
      font-family: 'Fraunces', serif;
      font-size: 14pt;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--navy);
      margin: 0;
      line-height: 1;
    }
    .section-sub {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-2);
      margin-left: auto;
    }

    /* ─── SUMMARY CALLOUT ─── */
    .callout {
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      border-radius: 3px 10px 10px 3px;
      font-family: 'Fraunces', serif;
      font-size: 11pt;
      line-height: 1.5;
      color: var(--ink);
      position: relative;
    }

    /* ─── METRICS ─── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 2px;
    }
    .metric {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      position: relative;
      overflow: hidden;
    }
    .metric::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }
    .metric .v {
      font-family: 'Fraunces', serif;
      font-size: 22pt;
      font-weight: 700;
      color: var(--navy);
      line-height: 1;
    }
    .metric .l {
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 600;
    }

    /* ─── KV GENERAL ─── */
    .kv-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0 28px;
    }
    .kv-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 10px;
      padding: 4px 0;
      border-bottom: 1px dotted var(--line);
      font-size: 9.5pt;
    }
    .kv-row:last-child { border-bottom: none; }
    .kv-row dt {
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      padding-top: 1px;
    }
    .kv-row dd { margin: 0; color: var(--ink); font-weight: 500; }

    /* ─── BLOCK CARDS ─── */
    .block-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .block {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 14px;
      page-break-inside: avoid;
      position: relative;
    }
    .block-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--line-2);
    }
    .block-icon { font-size: 13px; }
    .block dl { margin: 0; }
    .block dt {
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-2);
      font-weight: 600;
      margin-top: 5px;
    }
    .block dt:first-child { margin-top: 0; }
    .block dd { margin: 1px 0 0; font-size: 9.5pt; color: var(--ink); line-height: 1.4; }
    .block-empty { font-size: 9pt; color: var(--muted-2); font-style: italic; }

    /* ─── CHIPS ─── */
    .chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 9pt;
      background: var(--line-2);
      color: #334155;
      border: 1px solid var(--line);
      margin: 2px 2px 2px 0;
      font-weight: 500;
    }
    .chip-blue { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
    .chip-violet { background: #f5f3ff; color: #6d28d9; border-color: #ddd6fe; }
    .chip-emerald { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
    .chip-amber { background: #fffbeb; color: #92400e; border-color: #fcd34d; }
    .chip-rose { background: #fef2f2; color: #9f1239; border-color: #fecaca; }

    /* ─── STACK ─── */
    .stack-header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .partner-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--navy), var(--navy-2));
      color: #fff;
      font-size: 9.5pt;
    }
    .partner-badge .k { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
    .pain {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-left: 3px solid var(--rose);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 10pt;
      color: #9f1239;
      margin: 6px 0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .stack-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    .stack-box {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      background: #fff;
      position: relative;
      overflow: hidden;
    }
    .stack-box::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--box-color, var(--accent));
    }
    .stack-box .k { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
    .stack-box .v { font-family: 'Fraunces', serif; font-size: 12pt; font-weight: 600; color: var(--navy); margin-top: 2px; line-height: 1.2; }
    .stack-box .sub { margin-top: 5px; }

    /* ─── ORG ─── */
    .org-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px 10px; }
    .area-group { margin-bottom: 10px; page-break-inside: avoid; grid-column: 1 / -1; }
    .area-group .area-members { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 8px; margin-top: 4px; }
    .area-title {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      padding: 3px 10px;
      background: var(--line-2);
      border-radius: 999px;
      display: inline-block;
    }
    .member-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      page-break-inside: avoid;
    }
    .avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 9.5pt; font-weight: 600; color: var(--navy); line-height: 1.2; }
    .member-role { font-size: 8pt; color: var(--muted); line-height: 1.2; }
    .member-meta { font-size: 7pt; color: var(--muted-2); margin-top: 1px; }

    /* ─── TABLES ─── */
    table.tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      margin-top: 4px;
    }
    table.tbl thead th {
      text-align: left;
      padding: 10px 12px;
      background: var(--navy);
      color: #fff;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    table.tbl thead th:first-child { border-radius: 8px 0 0 0; }
    table.tbl thead th:last-child { border-radius: 0 8px 0 0; }
    table.tbl tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line-2);
      vertical-align: top;
    }
    table.tbl tbody tr:nth-child(even) { background: #fafbfc; }
    table.tbl tbody tr:last-child td { border-bottom: none; }

    /* ─── SIGNALS TIMELINE ─── */
    .timeline { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px 14px; position: relative; }
    .timeline-item {
      position: relative;
      padding: 7px 10px 7px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      page-break-inside: avoid;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: 6px; top: 10px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--accent);
    }
    .timeline-date {
      font-size: 7pt;
      color: var(--muted-2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .timeline-title { font-size: 9pt; color: var(--ink); font-weight: 500; margin-top: 1px; line-height: 1.3; }
    .timeline-src { font-size: 7pt; color: var(--muted); margin-top: 1px; }

    /* ─── OPEN QUESTIONS ─── */
    .qgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px 8px; }
    .qcard {
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
      border: 1px solid #fde68a;
      border-left: 3px solid var(--amber);
      border-radius: 6px;
      padding: 7px 10px;
      page-break-inside: avoid;
    }
    .qcard .qtop {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }
    .qcard .qtopic {
      font-size: 7pt;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #92400e;
      font-weight: 700;
      padding: 1px 7px;
      background: rgba(217, 119, 6, 0.15);
      border-radius: 999px;
    }
    .qcard .qprio { font-size: 7pt; color: var(--amber); font-weight: 600; }
    .qcard .qtext { font-size: 9pt; color: #78350f; line-height: 1.4; }

    /* ─── FOOTER ─── */
    .sheet-footer {
      margin: 0 16mm 10mm;
      padding-top: 6px;
      display: flex;
      justify-content: space-between;
      font-size: 7pt;
      color: var(--muted-2);
      letter-spacing: 0.05em;
      border-top: 1px solid var(--line);
    }

    @media print {
      body { background: #fff; }
      .toolbar { display: none !important; }
      .sheet {
        margin: 0;
        box-shadow: none;
        page-break-after: always;
        width: 210mm;
        min-height: 297mm;
      }
      .sheet:last-child { page-break-after: auto; }
      @page { size: A4; margin: 0; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
    <button class="btn" onclick="window.close()">Cerrar</button>
    <span id="status" style="font-size:11px;color:var(--muted);margin-left:auto"></span>
  </div>
  <div id="root"></div>

<script>
const qs = new URLSearchParams(location.search);
const companyId = parseInt(qs.get('id'));
const autoPrint = qs.get('print') === '1';

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function prettyLabel(k) { return String(k).replace(/_/g, ' ').replace(/\b\w/g, (c) => c.toUpperCase()); }
function toArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  if (typeof v === 'string') return v.split(/[,;·•|]/).map((s) => s.trim()).filter(Boolean);
  return [String(v)];
}
function asStr(v) { return v == null ? '' : (typeof v === 'object' ? JSON.stringify(v) : String(v)); }

const AREA_COLORS = {
  'ceo':'#6366f1','dirección':'#6366f1','general':'#6366f1',
  'it':'#0ea5e9','sistemas':'#0ea5e9','tecnología':'#0ea5e9','tech':'#0ea5e9',
  'finanzas':'#10b981','financiero':'#10b981','cfo':'#10b981',
  'operaciones':'#f59e0b','coo':'#f59e0b',
  'comercial':'#ec4899','ventas':'#ec4899','marketing':'#ec4899',
  'rrhh':'#8b5cf6','personas':'#8b5cf6','hr':'#8b5cf6',
  'compras':'#14b8a6','procurement':'#14b8a6',
};
function areaColor(area) {
  const a = (area || '').toLowerCase();
  for (const k of Object.keys(AREA_COLORS)) if (a.includes(k)) return AREA_COLORS[k];
  return '#64748b';
}
function initials(name) { return (name || '?').split(/\s+/).slice(0, 2).map((w) => w[0] || '').join('').toUpperCase(); }

function renderBlockKV(obj) {
  if (!obj || Object.keys(obj).length === 0) return '<div class="block-empty">Sin datos.</div>';
  return `<dl>${Object.entries(obj).map(([k, v]) => `
    <dt>${escapeHtml(prettyLabel(k))}</dt>
    <dd>${Array.isArray(v)
      ? v.map((x) => `<span class="chip">${escapeHtml(asStr(x))}</span>`).join('')
      : (typeof v === 'object' && v !== null
          ? Object.entries(v).map(([k2, v2]) => `<div style="font-size:10pt;margin-top:2px"><span style="color:var(--muted-2);font-size:8.5pt">${escapeHtml(prettyLabel(k2))}:</span> ${escapeHtml(asStr(v2))}</div>`).join('')
          : escapeHtml(asStr(v)))
    }</dd>
  `).join('')}</dl>`;
}

async function load() {
  if (!companyId) { document.getElementById('root').innerHTML = '<div style="padding:40px;color:#e11d48">Falta parámetro ?id=</div>'; return; }
  const token = localStorage.getItem('token');
  if (!token) { window.location.href = '/login'; return; }
  const authH = { 'Authorization': 'Bearer ' + token };
  document.getElementById('status').textContent = 'Cargando...';
  const [full, openQs] = await Promise.all([
    fetch('/api/kyc/companies/' + companyId, { headers: authH }).then((r) => {
      if (r.status === 401) { localStorage.removeItem('token'); window.location.href = '/login'; throw new Error('unauth'); }
      return r.json();
    }),
    fetch('/api/kyc/companies/' + companyId + '/open-questions', { headers: authH }).then((r) => r.ok ? r.json() : []),
  ]);
  render(full, openQs);
  document.getElementById('status').textContent = 'Listo';
  document.title = 'Informe KYC · ' + (full.company?.name || companyId);
  if (autoPrint) setTimeout(() => window.print(), 600);
}

function render(data, openQs) {
  const { company, profile, completeness, org, signals } = data;
  const p = profile || {};
  const stack = p.tech_stack || {};
  const today = new Date().toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' });
  const yr = new Date().getFullYear();
  const members = org?.members || [];
  const byArea = members.reduce((acc, m) => { const k = m.area || 'Sin área'; (acc[k] = acc[k] || []).push(m); return acc; }, {});

  // Completeness ring path
  const r = 64, c = 2 * Math.PI * r;
  const off = c - ((completeness || 0) / 100) * c;

  // ─── SHEET 1 · COVER ────────────────────────────────────────────────
  const cover = `
    <section class="sheet cover">
      <div class="cover-inner">
        <div class="cover-brand">
          <div class="cover-brand-mark">A</div>
          <div class="cover-brand-text">Avvale · Industry Intelligence</div>
        </div>

        <div>
          <div class="cover-label">Informe KYC confidencial · ${yr}</div>
          <h1 class="cover-title display">${escapeHtml(company.name)}</h1>
          <p class="cover-subtitle">${escapeHtml(p.summary || 'Perfil estratégico de cliente: organización, stack tecnológico, señales de mercado y ángulos de entrada comerciales.')}</p>

          <div class="cover-meta">
            <div class="cover-meta-item">
              <div class="k">Sector</div>
              <div class="v">${escapeHtml(company.sector || '—')}</div>
            </div>
            <div class="cover-meta-item">
              <div class="k">Ubicación</div>
              <div class="v">${escapeHtml([company.city, company.country].filter(Boolean).join(', ') || '—')}</div>
            </div>
            <div class="cover-meta-item">
              <div class="k">Completado</div>
              <div class="v">${completeness || 0}% · ${members.length} personas</div>
            </div>
          </div>
        </div>

        <svg class="cover-ring" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="${r}" fill="none" stroke="#fff" stroke-width="8"/>
          <circle cx="100" cy="100" r="${r}" fill="none" stroke="url(#cover-g)" stroke-width="8"
                  stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"
                  transform="rotate(-90 100 100)"/>
          <defs>
            <linearGradient id="cover-g" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#60a5fa"/>
              <stop offset="1" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>

        <div class="cover-footer">
          <div>Gerard Prats · Industry Director</div>
          <div>${today}</div>
        </div>
      </div>
    </section>
  `;

  // ─── SHEET 2 · RESUMEN + DATOS + PERFIL ─────────────────────────────
  const sheet2 = `
    <section class="sheet">
      <div class="sheet-inner">
        <div class="section">
          <div class="section-head">
            <div class="section-num">01</div>
            <h2 class="section-title">Resumen ejecutivo</h2>
            <div class="section-sub">${today}</div>
          </div>
          ${p.summary ? `<div class="callout">${escapeHtml(p.summary)}</div>` : '<div class="block-empty">Sin resumen. Usa la entrevista KYC para generarlo.</div>'}
        </div>

        <div class="section">
          <div class="metrics">
            <div class="metric"><div class="v">${members.length}</div><div class="l">Personas</div></div>
            <div class="metric"><div class="v">${(signals || []).length}</div><div class="l">Signals</div></div>
            <div class="metric"><div class="v">${(openQs || []).length}</div><div class="l">Por resolver</div></div>
            <div class="metric"><div class="v">${completeness || 0}%</div><div class="l">Completado</div></div>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <div class="section-num">02</div>
            <h2 class="section-title">Datos generales</h2>
          </div>
          <div class="kv-grid">
            <div>
              <div class="kv-row"><dt>Razón social</dt><dd>${escapeHtml(company.name)}</dd></div>
              <div class="kv-row"><dt>Sector</dt><dd>${escapeHtml(company.sector || '—')}</dd></div>
              <div class="kv-row"><dt>Ciudad</dt><dd>${escapeHtml(company.city || '—')}</dd></div>
              <div class="kv-row"><dt>País</dt><dd>${escapeHtml(company.country || '—')}</dd></div>
            </div>
            <div>
              <div class="kv-row"><dt>Web</dt><dd>${escapeHtml(company.website || '—')}</dd></div>
              <div class="kv-row"><dt>Facturación</dt><dd>${escapeHtml(company.revenue || '—')}</dd></div>
              <div class="kv-row"><dt>Empleados</dt><dd>${escapeHtml(company.employees || '—')}</dd></div>
              <div class="kv-row"><dt>Estratégica</dt><dd>${p.strategic ? '★ Sí' : 'No'}</dd></div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <div class="section-num">03</div>
            <h2 class="section-title">Perfil de negocio</h2>
          </div>
          <div class="block-grid">
            ${[
              ['economics',          '💰 Economía'],
              ['business_model',     '🧭 Modelo de negocio'],
              ['customers',          '👥 Clientes'],
              ['critical_processes', '🔁 Procesos críticos'],
              ['sector_context',     '🌐 Contexto sector'],
            ].map(([k, label]) => `
              <div class="block">
                <div class="block-title">${label}</div>
                ${renderBlockKV(p[k])}
              </div>
            `).join('')}
          </div>
        </div>
      </div>
      <div class="sheet-footer">
        <div>Informe KYC · ${escapeHtml(company.name)}</div>
        <div>2 / 4 · Avvale</div>
      </div>
    </section>
  `;

  // ─── SHEET 3 · STACK + ORG ──────────────────────────────────────────
  const stackBox = (label, value, sub, color) => {
    if (!value) return '';
    return `<div class="stack-box" style="--box-color:${color}">
      <div class="k">${label}</div>
      <div class="v">${escapeHtml(value)}</div>
      ${sub && sub.length ? `<div class="sub">${sub.map((x) => `<span class="chip chip-blue">${escapeHtml(asStr(x))}</span>`).join('')}</div>` : ''}
    </div>`;
  };
  const sectorialesArr = toArr(stack.sectoriales || stack.sectorial);
  const doloresArr = toArr(stack.dolores || stack.pain_points);
  const partner = asStr(stack.partner_actual || stack.partner);

  const sheet3 = `
    <section class="sheet">
      <div class="sheet-inner">
        <div class="section">
          <div class="section-head">
            <div class="section-num">04</div>
            <h2 class="section-title">Stack tecnológico</h2>
          </div>
          <div class="stack-header">
            ${partner ? `<div class="partner-badge"><span class="k">Partner</span><strong>${escapeHtml(partner)}</strong></div>` : ''}
          </div>
          ${doloresArr.length ? doloresArr.map((d) => `<div class="pain"><span>⚠️</span><span>${escapeHtml(asStr(d))}</span></div>`).join('') : ''}
          <div class="stack-grid">
            ${stackBox('ERP', asStr(stack.erp), toArr(stack.erp_modulos || stack.modulos), '#2563eb')}
            ${stackBox('CRM', asStr(stack.crm), null, '#ec4899')}
            ${stackBox('Cloud / Infra', asStr(stack.cloud || stack.infra), null, '#0284c7')}
            ${stackBox('BI / Analítica', asStr(stack.bi || stack.analytics), null, '#059669')}
            ${sectorialesArr.length ? `<div class="stack-box" style="--box-color:#7c3aed">
              <div class="k">Sistemas sectoriales</div>
              <div class="sub" style="margin-top:6px">${sectorialesArr.map((x) => `<span class="chip chip-violet">${escapeHtml(asStr(x))}</span>`).join('')}</div>
            </div>` : ''}
            ${stackBox('Integración', asStr(stack.integracion || stack.middleware || stack.btp), null, '#d97706')}
          </div>
          ${stack.notes || stack.notas ? `<div style="margin-top:14px;font-size:10pt;color:var(--muted);font-style:italic">${escapeHtml(asStr(stack.notes || stack.notas))}</div>` : ''}
        </div>

        <div class="section">
          <div class="section-head">
            <div class="section-num">05</div>
            <h2 class="section-title">Organigrama</h2>
            <div class="section-sub">${members.length} personas</div>
          </div>
          ${members.length ? Object.entries(byArea).map(([area, list]) => `
            <div class="area-group">
              <div class="area-title" style="color:${areaColor(area)}">${escapeHtml(area)} · ${list.length}</div>
              <div class="area-members">
              ${list.map((m) => {
                const col = areaColor(m.area);
                const parent = members.find((x) => x.id === m.reports_to_id);
                return `
                  <div class="member-card">
                    <div class="avatar" style="background:${col}">${escapeHtml(initials(m.name))}</div>
                    <div class="member-info">
                      <div class="member-name">${escapeHtml(m.name)}</div>
                      <div class="member-role">${escapeHtml(m.role || '—')}${parent ? ' · ↑ ' + escapeHtml(parent.name) : ''}</div>
                    </div>
                  </div>
                `;
              }).join('')}
              </div>
            </div>
          `).join('') : '<div class="block-empty">Sin miembros registrados.</div>'}

          ${(org?.relationships || []).length ? `
            <div style="margin-top:16px">
              <div class="area-title">Relaciones informales</div>
              <table class="tbl">
                <thead><tr><th>De</th><th>A</th><th>Tipo</th></tr></thead>
                <tbody>
                  ${org.relationships.map((r) => {
                    const f = members.find((m) => m.id === r.from_member_id);
                    const t = members.find((m) => m.id === r.to_member_id);
                    return `<tr><td>${escapeHtml(f?.name || '?')}</td><td>${escapeHtml(t?.name || '?')}</td><td><span class="chip">${escapeHtml(r.type)}</span></td></tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          ` : ''}
        </div>
      </div>
      <div class="sheet-footer">
        <div>Informe KYC · ${escapeHtml(company.name)}</div>
        <div>3 / 4 · Avvale</div>
      </div>
    </section>
  `;

  // ─── SHEET 4 · SIGNALS + POR RESOLVER ───────────────────────────────
  const sheet4 = `
    <section class="sheet">
      <div class="sheet-inner">
        <div class="section">
          <div class="section-head">
            <div class="section-num">06</div>
            <h2 class="section-title">Señales recientes</h2>
            <div class="section-sub">${(signals || []).length} eventos</div>
          </div>
          ${(signals || []).length ? `
            <div class="timeline">
              ${signals.slice(0, 20).map((s) => `
                <div class="timeline-item">
                  <div class="timeline-date">${s.published_at ? new Date(s.published_at).toLocaleDateString('es-ES') : (s.captured_at ? new Date(s.captured_at).toLocaleDateString('es-ES') : '—')} · ${escapeHtml(s.source || '')}</div>
                  <div class="timeline-title">${escapeHtml(s.title || s.text?.slice(0,140) || '—')}</div>
                  ${s.sentiment ? `<div class="timeline-src">${escapeHtml(s.sentiment)}${s.rating ? ' · ⭐ ' + s.rating : ''}</div>` : ''}
                </div>
              `).join('')}
            </div>
          ` : '<div class="block-empty">Sin señales registradas.</div>'}
        </div>

        <div class="section">
          <div class="section-head">
            <div class="section-num">07</div>
            <h2 class="section-title">Preguntas por resolver</h2>
            <div class="section-sub">${(openQs || []).length} abiertas</div>
          </div>
          ${(openQs || []).length ? `<div class="qgrid">${openQs.map((q) => `
            <div class="qcard">
              <div class="qtop">
                <span class="qtopic">${escapeHtml(q.topic)}</span>
                <span class="qprio">P${q.priority}</span>
              </div>
              <div class="qtext">${escapeHtml(q.question)}</div>
            </div>
          `).join('')}</div>` : '<div class="block-empty">Ninguna. Perfil completo.</div>'}
        </div>
      </div>
      <div class="sheet-footer">
        <div>Informe KYC · ${escapeHtml(company.name)}</div>
        <div>4 / 4 · Avvale</div>
      </div>
    </section>
  `;

  document.getElementById('root').innerHTML = cover + sheet2 + sheet3 + sheet4;
}

load().catch((e) => {
  document.getElementById('root').innerHTML = '<div style="padding:40px;color:#e11d48">Error: ' + e.message + '</div>';
});
</script>
</body>
</html>
