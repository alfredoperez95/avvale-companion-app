<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP Fiori Launchpad – Prototipo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="shell-header" role="banner">
    <span class="logo">Activaciones</span>
    <input type="search" class="search" placeholder="Buscar..." aria-label="Buscar" />
    <span class="user-avatar" aria-hidden="true">AP</span>
  </header>

  <main class="launchpad-content">
    <section aria-labelledby="group-apps">
      <h2 id="group-apps" class="tile-group-title">Aplicaciones</h2>
      <div class="tile-group" role="list">
        <a href="#" class="tile" role="listitem">
          <span class="tile-icon" aria-hidden="true">◇</span>
          <span class="tile-title">Mis activaciones</span>
          <span class="tile-subtitle">Ver listado</span>
        </a>
        <a href="#" class="tile" role="listitem">
          <span class="tile-icon" aria-hidden="true">+</span>
          <span class="tile-title">Nueva activación</span>
          <span class="tile-subtitle">Crear borrador</span>
        </a>
        <a href="#" class="tile" role="listitem">
          <span class="tile-icon" aria-hidden="true">👤</span>
          <span class="tile-title">Mi perfil</span>
          <span class="tile-subtitle">Datos y apariencia</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
